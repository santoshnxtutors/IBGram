name: Deploy IB Gram to CloudPanel VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  DEPLOY_PATH: /home/ibgram/htdocs/www.ibgram.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Ports are NOT hardcoded — single source of truth here.
  # Override without editing this file by setting repo Variables
  # (Settings -> Secrets and variables -> Actions -> Variables):
  #   APP_PORT      = CloudPanel "App Port" for Next.js (default 3005)
  #   BACKEND_PORT  = Express backend port (default 4000)
  APP_PORT: ${{ vars.APP_PORT || '3005' }}
  BACKEND_PORT: ${{ vars.BACKEND_PORT || '4000' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/ibgram?schema=public

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check required build secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          for key in DATABASE_URL NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_APP_URL BACKEND_URL CORS_ORIGIN ADMIN_EMAIL ADMIN_USERNAME ADMIN_PASSWORD ADMIN_SESSION_SECRET AUTH_SESSION_SECRET JWT_ACCESS_SECRET JWT_REFRESH_SECRET; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Generate Prisma client
        run: npx prisma generate --schema database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build backend packages
        run: npm run backend:build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_CONNECTION_LIMIT: ${{ secrets.PRISMA_CONNECTION_LIMIT || '3' }}
          PRISMA_POOL_TIMEOUT: ${{ secrets.PRISMA_POOL_TIMEOUT || '30' }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_UPLOAD_MAX_BYTES: ${{ secrets.NEXT_PUBLIC_UPLOAD_MAX_BYTES || '5242880' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_CONNECTION_LIMIT: ${{ secrets.PRISMA_CONNECTION_LIMIT || '3' }}
          PRISMA_POOL_TIMEOUT: ${{ secrets.PRISMA_POOL_TIMEOUT || '30' }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          COOKIE_SECURE: "true"
          UPLOAD_PROVIDER: ${{ secrets.UPLOAD_PROVIDER || 'local' }}
          UPLOAD_DIR: public/uploads
          UPLOAD_MAX_BYTES: ${{ secrets.UPLOAD_MAX_BYTES || '5242880' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5.2' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ibgram-build
          retention-days: 1
          path: |
            .next/
            backend/dist/
            backend/package.json
            backend/tsconfig.json
            shared/dist/
            shared/src/
            shared/package.json
            shared/tsconfig.json
            authentication/dist/
            authentication/src/
            authentication/package.json
            authentication/tsconfig.json
            database/
            public/
            src/
            scripts/
            package.json
            package-lock.json
            next.config.ts
            tsconfig.json
            .npmrc
            ecosystem.config.js

  deploy:
    name: Deploy to CloudPanel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ibgram-build
          path: deploy/

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Check required deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for key in VPS_HOST VPS_USER VPS_SSH_PORT; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ -z "${VPS_SSH_PASSWORD:-}" ] && [ -z "${VPS_SSH_KEY:-}" ]; then
            missing+=("VPS_SSH_PASSWORD or VPS_SSH_KEY")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${VPS_SSH_KEY:-}" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/ibgram_deploy_key
            chmod 600 ~/.ssh/ibgram_deploy_key
          fi

          ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare empty CloudPanel folder
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          ssh_options="-p ${VPS_SSH_PORT} -o StrictHostKeyChecking=yes"
          if [ -f ~/.ssh/ibgram_deploy_key ]; then
            ssh_options="-i ${HOME}/.ssh/ibgram_deploy_key ${ssh_options}"
          fi

          quoted_deploy_path="$(printf '%q' "$DEPLOY_PATH")"
          remote_prepare="$(cat <<PREPARE
          set -e
          DEPLOY_PATH=${quoted_deploy_path}

          if [ "\$DEPLOY_PATH" != "/home/ibgram/htdocs/www.ibgram.com" ]; then
            echo "Refusing to clean unexpected deploy path: \$DEPLOY_PATH"
            exit 1
          fi

          if command -v pm2 >/dev/null 2>&1; then
            pm2 delete all >/dev/null 2>&1 || true
          fi

          if command -v fuser >/dev/null 2>&1; then
            fuser -k 3000/tcp >/dev/null 2>&1 || true
            fuser -k ${{ env.APP_PORT }}/tcp >/dev/null 2>&1 || true
            fuser -k ${{ env.BACKEND_PORT }}/tcp >/dev/null 2>&1 || true
          fi

          mkdir -p "\$DEPLOY_PATH/public/uploads" /home/ibgram/logs
          find "\$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name public -exec rm -rf {} +
          find "\$DEPLOY_PATH/public" -mindepth 1 -maxdepth 1 ! -name uploads -exec rm -rf {} +
          rm -f "\$DEPLOY_PATH/.env"
          PREPARE
          )"

          if [ -n "${VPS_SSH_PASSWORD:-}" ]; then
            sshpass -e ssh ${ssh_options} "${VPS_USER}@${VPS_HOST}" "$remote_prepare"
          else
            ssh ${ssh_options} "${VPS_USER}@${VPS_HOST}" "$remote_prepare"
          fi

      - name: Rsync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          ssh_options="-p ${VPS_SSH_PORT} -o StrictHostKeyChecking=yes"
          if [ -f ~/.ssh/ibgram_deploy_key ]; then
            ssh_options="-i ${HOME}/.ssh/ibgram_deploy_key ${ssh_options}"
          fi

          rsync_cmd=(rsync -az --delete
            --exclude='node_modules'
            --exclude='public/uploads/'
            -e "ssh ${ssh_options}"
            deploy/
            "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/")

          if [ -n "${VPS_SSH_PASSWORD:-}" ]; then
            sshpass -e "${rsync_cmd[@]}"
          else
            "${rsync_cmd[@]}"
          fi

      - name: Install, prepare database, and restart PM2
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          APP_PORT: ${{ env.APP_PORT }}
          BACKEND_PORT: ${{ env.BACKEND_PORT }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_CONNECTION_LIMIT: ${{ secrets.PRISMA_CONNECTION_LIMIT || '3' }}
          PRISMA_POOL_TIMEOUT: ${{ secrets.PRISMA_POOL_TIMEOUT || '30' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_TTL: 8h
          ACCESS_TOKEN_TTL: 15m
          REFRESH_TOKEN_TTL: 30d
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          COOKIE_SECURE: "true"
          AUTH_RATE_LIMIT_WINDOW_MS: ${{ secrets.AUTH_RATE_LIMIT_WINDOW_MS || '900000' }}
          AUTH_RATE_LIMIT_MAX: ${{ secrets.AUTH_RATE_LIMIT_MAX || '10' }}
          UPLOAD_PROVIDER: ${{ secrets.UPLOAD_PROVIDER || 'local' }}
          UPLOAD_DIR: public/uploads
          UPLOAD_MAX_BYTES: ${{ secrets.UPLOAD_MAX_BYTES || '5242880' }}
          NEXT_PUBLIC_UPLOAD_MAX_BYTES: ${{ secrets.NEXT_PUBLIC_UPLOAD_MAX_BYTES || '5242880' }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5.2' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
        run: |
          set -euo pipefail
          ssh_options="-p ${VPS_SSH_PORT} -o StrictHostKeyChecking=yes"
          if [ -f ~/.ssh/ibgram_deploy_key ]; then
            ssh_options="-i ${HOME}/.ssh/ibgram_deploy_key ${ssh_options}"
          fi

          emit_export() {
            local key="$1"
            printf 'export %s=' "$key"
            printf '%q' "${!key:-}"
            printf '\n'
          }

          run_remote() {
            if [ -n "${VPS_SSH_PASSWORD:-}" ]; then
              sshpass -e ssh ${ssh_options} "${VPS_USER}@${VPS_HOST}" "bash -s"
            else
              ssh ${ssh_options} "${VPS_USER}@${VPS_HOST}" "bash -s"
            fi
          }

          {
            for key in \
              DEPLOY_PATH \
              NODE_ENV NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_APP_URL APP_PORT BACKEND_PORT BACKEND_URL CORS_ORIGIN \
              DATABASE_URL PRISMA_CONNECTION_LIMIT PRISMA_POOL_TIMEOUT \
              ADMIN_EMAIL ADMIN_USERNAME ADMIN_PASSWORD ADMIN_PASSWORD_HASH ADMIN_SESSION_SECRET \
              AUTH_SESSION_SECRET JWT_ACCESS_SECRET JWT_REFRESH_SECRET SESSION_TTL ACCESS_TOKEN_TTL REFRESH_TOKEN_TTL \
              COOKIE_DOMAIN COOKIE_SECURE AUTH_RATE_LIMIT_WINDOW_MS AUTH_RATE_LIMIT_MAX \
              UPLOAD_PROVIDER UPLOAD_DIR UPLOAD_MAX_BYTES NEXT_PUBLIC_UPLOAD_MAX_BYTES \
              CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET \
              AWS_REGION AWS_S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY \
              OPENAI_API_KEY OPENAI_MODEL SENTRY_DSN LOG_LEVEL; do
              emit_export "$key"
            done

            cat <<'REMOTE_SCRIPT'
            set -euo pipefail

            load_node_path() {
              set +u
              site_home="${DEPLOY_PATH%%/htdocs/*}"

              for profile in /etc/profile "$HOME/.profile" "$HOME/.bash_profile" "$HOME/.bashrc"; do
                if [ -r "$profile" ]; then
                  . "$profile" >/dev/null 2>&1 || true
                fi
              done

              if [ -s "$site_home/.nvm/nvm.sh" ]; then
                . "$site_home/.nvm/nvm.sh"
                nvm use 20 >/dev/null 2>&1 || nvm install 20 >/dev/null 2>&1 || nvm use --lts >/dev/null 2>&1 || true
              fi

              if [ -s "$HOME/.nvm/nvm.sh" ]; then
                . "$HOME/.nvm/nvm.sh"
                nvm use 20 >/dev/null 2>&1 || nvm install 20 >/dev/null 2>&1 || nvm use --lts >/dev/null 2>&1 || true
              fi

              if [ -s "/usr/local/nvm/nvm.sh" ]; then
                . "/usr/local/nvm/nvm.sh"
                nvm use 20 >/dev/null 2>&1 || nvm install 20 >/dev/null 2>&1 || nvm use --lts >/dev/null 2>&1 || true
              fi

              export PATH="$site_home/.npm-global/bin:$site_home/.local/bin:$HOME/.npm-global/bin:$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:/snap/bin:$PATH"
              set -u
            }

            load_node_path

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm was not found on the VPS SSH PATH. Install Node.js 20 for this SSH user or add npm to PATH."
              exit 127
            fi

            if command -v pm2 >/dev/null 2>&1; then
              PM2_CMD="pm2"
            else
              PM2_CMD="npx --yes pm2"
            fi

            cd "$DEPLOY_PATH"

            mkdir -p public/uploads /home/ibgram/logs
            rm -f .env

            echo "Installing dependencies..."
            npm ci --include=dev --legacy-peer-deps

            echo "Generating Prisma client..."
            npx --no-install prisma generate --schema database/prisma/schema.prisma

            if [ -d database/prisma/migrations ] && find database/prisma/migrations -mindepth 1 -maxdepth 1 -type d | grep -q .; then
              echo "Running Prisma migrations..."
              npx --no-install prisma migrate deploy --schema database/prisma/schema.prisma
            else
              echo "No Prisma migrations directory found; pushing Prisma schema..."
              npx --no-install prisma db push --skip-generate --schema database/prisma/schema.prisma
            fi

            echo "Seeding database..."
            npm run db:seed
            npm run db:seed-cms

            echo "Stopping old PM2 apps and freeing IBGram ports..."
            $PM2_CMD delete all >/dev/null 2>&1 || true
            if command -v fuser >/dev/null 2>&1; then
              fuser -k 3000/tcp >/dev/null 2>&1 || true
              fuser -k "${APP_PORT}/tcp" >/dev/null 2>&1 || true
              fuser -k "${BACKEND_PORT}/tcp" >/dev/null 2>&1 || true
            fi

            echo "Restarting PM2 apps..."
            $PM2_CMD startOrReload ecosystem.config.js --update-env
            $PM2_CMD save

            echo "Waiting for Next.js to start listening on port ${APP_PORT} (up to 120s)..."
            nextjs_home=""
            nextjs_ready=0
            for attempt in $(seq 1 40); do
              if nextjs_home="$(curl -fsS --max-time 5 "http://127.0.0.1:${APP_PORT}/" 2>/dev/null)"; then
                nextjs_ready=1
                echo "Next.js is up after ~$((attempt * 3))s."
                break
              fi
              sleep 3
            done

            if [ "$nextjs_ready" -ne 1 ]; then
              echo "ERROR: Next.js never responded on port ${APP_PORT}. Diagnostics:"
              $PM2_CMD list || true
              echo "--- ibgram-nextjs logs (last 80 lines) ---"
              $PM2_CMD logs ibgram-nextjs --lines 80 --nostream || true
              exit 1
            fi

            if printf '%s' "$nextjs_home" | grep -qi "BoardPeFocus"; then
              echo "ERROR: Port ${APP_PORT} is serving BoardPeFocus instead of IBGram."
              exit 1
            fi

            echo "Checking backend health on port ${BACKEND_PORT} (up to 60s)..."
            backend_ready=0
            for attempt in $(seq 1 20); do
              if curl -fsS --max-time 5 "http://127.0.0.1:${BACKEND_PORT}/health" >/dev/null 2>&1; then
                backend_ready=1
                echo "Backend is up after ~$((attempt * 3))s."
                break
              fi
              sleep 3
            done

            if [ "$backend_ready" -ne 1 ]; then
              echo "ERROR: Backend never responded on port ${BACKEND_PORT}. Diagnostics:"
              $PM2_CMD list || true
              echo "--- ibgram-backend logs (last 80 lines) ---"
              $PM2_CMD logs ibgram-backend --lines 80 --nostream || true
              exit 1
            fi

            echo "Deployment complete."
          REMOTE_SCRIPT
          } | run_remote

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for app to boot
        run: sleep 15

      - name: Check production site
        run: |
          set -euo pipefail
          body_file="$(mktemp)"
          status="$(curl -s -L -o "$body_file" -w '%{http_code}' --max-time 30 https://www.ibgram.com/)"
          echo "HTTP status: ${status}"
          if [ "$status" = "403" ]; then
            echo "CloudPanel returned 403. Deploy succeeded, but the public Vhost is not proxying to the Next.js app yet."
            echo "Fix CloudPanel Vhost to proxy / to http://127.0.0.1:${{ env.APP_PORT }}."
            exit 0
          fi
          if [ "$status" != "200" ] && [ "$status" != "301" ] && [ "$status" != "302" ]; then
            exit 1
          fi
          if grep -qi "BoardPeFocus" "$body_file"; then
            echo "Production domain is still serving BoardPeFocus instead of IBGram."
            exit 1
          fi
