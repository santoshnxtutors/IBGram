name: Deploy IB Gram → CloudPanel VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-flight runs for the same branch on new push
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DEPLOY_PATH: /home/ibgram/htdocs/www.ibgram.com

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — Lint (runs on every push + PR)
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Build full app (Next.js + backend)
  #          Only runs on push to main
  # ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Build shared packages, auth module and Express backend
      - name: Build backend packages
        run: npm run backend:build

      # Build Next.js with all production env vars baked in
      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_UPLOAD_MAX_BYTES: ${{ secrets.NEXT_PUBLIC_UPLOAD_MAX_BYTES }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          UPLOAD_PROVIDER: ${{ secrets.UPLOAD_PROVIDER }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # Upload full repo + build output as one artefact
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ibgram-build
          retention-days: 1
          path: |
            .next/
            backend/dist/
            shared/dist/
            authentication/dist/
            database/
            public/
            src/
            scripts/
            package.json
            package-lock.json
            next.config.ts
            tsconfig.json
            .npmrc
            ecosystem.config.js

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Deploy to CloudPanel VPS via SSH + rsync
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy → CloudPanel VPS (ibgram.com)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://www.ibgram.com
    steps:
      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: ibgram-build
          path: deploy/

      # Set up SSH key for ibgramuser
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # Sync built files to /home/ibgram/htdocs/www.ibgram.com
      # Excludes: node_modules (installed fresh on server), .env (already on server)
      - name: Rsync files to VPS
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='public/uploads/' \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.VPS_SSH_PORT || '22' }} -o StrictHostKeyChecking=no" \
            deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      # Install deps, run migrations, restart PM2
      - name: Install, migrate & restart
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p ${{ secrets.VPS_SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -e
            cd /home/ibgram/htdocs/www.ibgram.com

            echo "==> Installing production dependencies..."
            npm ci --omit=dev --legacy-peer-deps

            echo "==> Generating Prisma client..."
            npx prisma generate --schema database/prisma/schema.prisma

            echo "==> Running database migrations..."
            npx prisma migrate deploy --schema database/prisma/schema.prisma

            echo "==> Restarting Next.js app with PM2..."
            pm2 restart ibgram-nextjs 2>/dev/null || \
              pm2 start ecosystem.config.js --only ibgram-nextjs

            echo "==> Restarting Express backend with PM2..."
            pm2 restart ibgram-backend 2>/dev/null || \
              pm2 start ecosystem.config.js --only ibgram-backend

            pm2 save
            echo "==> Deploy complete!"
          ENDSSH

  # ─────────────────────────────────────────────────────────
  # JOB 4 — Smoke test (checks site + API are live)
  # ─────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for app to boot
        run: sleep 15

      - name: Check www.ibgram.com is responding
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://www.ibgram.com")
          echo "HTTP status: $STATUS"
          if [[ "$STATUS" != "200" && "$STATUS" != "301" && "$STATUS" != "302" ]]; then
            echo "FAILED — site returned HTTP $STATUS"
            exit 1
          fi
          echo "PASSED"

      - name: Check backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.BACKEND_URL }}/health" 2>/dev/null || echo "000")
          echo "Backend HTTP status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "WARNING: Backend health check skipped (BACKEND_URL may not be set)"
          elif [ "$STATUS" != "200" ]; then
            echo "FAILED — backend returned HTTP $STATUS"
            exit 1
          else
            echo "PASSED"
          fi
