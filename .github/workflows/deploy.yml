name: Deploy IB Gram → CloudPanel VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DEPLOY_PATH: /home/ibgram/htdocs/www.ibgram.com

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint (every push + PR)
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2 — Build (only on push to main)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build backend packages
        run: npm run backend:build

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_UPLOAD_MAX_BYTES: "5242880"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          UPLOAD_PROVIDER: "local"

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: ibgram-build
          retention-days: 1
          path: |
            .next/
            backend/dist/
            shared/dist/
            authentication/dist/
            database/
            public/
            src/
            scripts/
            package.json
            package-lock.json
            next.config.ts
            tsconfig.json
            .npmrc
            ecosystem.config.js

  # ─────────────────────────────────────────
  # JOB 3 — Deploy via SSH password
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → CloudPanel (ibgramuser)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://www.ibgram.com
    steps:
      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: ibgram-build
          path: deploy/

      # Install sshpass for password-based SSH
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      # Add VPS to known hosts
      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Create .env file from GitHub secrets and include in deploy ──────────
      - name: Create .env file from GitHub secrets
        run: |
          cat > deploy/.env << EOF
          NODE_ENV=production

          # URLs
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          BACKEND_URL=${{ secrets.BACKEND_URL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}

          # Database
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          # Admin panel login
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_SESSION_SECRET=${{ secrets.ADMIN_SESSION_SECRET }}

          # Auth (backend)
          AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_TTL=8h
          ACCESS_TOKEN_TTL=15m
          REFRESH_TOKEN_TTL=30d
          COOKIE_SECURE=true

          # Uploads
          UPLOAD_PROVIDER=local
          UPLOAD_DIR=public/uploads
          UPLOAD_MAX_BYTES=5242880
          NEXT_PUBLIC_UPLOAD_MAX_BYTES=5242880
          EOF

      # Sync all files INCLUDING .env to server
      - name: Rsync files to VPS
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='public/uploads/' \
            -e "ssh -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=no" \
            deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      # Install deps, migrate DB, restart PM2
      - name: Install, migrate & restart on VPS
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /home/ibgram/htdocs/www.ibgram.com

            echo "==> Installing production dependencies..."
            npm ci --omit=dev --legacy-peer-deps

            echo "==> Generating Prisma client..."
            npx prisma generate --schema database/prisma/schema.prisma

            echo "==> Running database migrations..."
            npx prisma migrate deploy --schema database/prisma/schema.prisma

            echo "==> Restarting Next.js (PM2)..."
            pm2 restart ibgram-nextjs 2>/dev/null || pm2 start ecosystem.config.js --only ibgram-nextjs

            echo "==> Restarting backend (PM2)..."
            pm2 restart ibgram-backend 2>/dev/null || pm2 start ecosystem.config.js --only ibgram-backend

            pm2 save
            echo "==> Deploy complete!"
          ENDSSH

  # ─────────────────────────────────────────
  # JOB 4 — Smoke test
  # ─────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for app to boot
        run: sleep 15

      - name: Check site is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://www.ibgram.com")
          echo "HTTP status: $STATUS"
          if [[ "$STATUS" != "200" && "$STATUS" != "301" && "$STATUS" != "302" ]]; then
            echo "FAILED — site returned HTTP $STATUS"
            exit 1
          fi
          echo "PASSED"
